


services:
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web-cont
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app-network

  api: 
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-cont
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/emp_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - mysql
    networks:
      - app-network

  mysql:
    image: mysql:8.4
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: emp_db

    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

volumes:
    mysql-data:

networks:
    app-network:
      driver: bridge    
